<div class="row">
	<div class="col-md-6">
		<div class="panel panel-default">
			<div class="panel-heading bg-white">date-range-picker</div>
			<div class="panel-body">
				<div class="form-group">
					<span style="position: relative;">
						<input type="text" class="input-text" placeholder="请选择时间" ng-model="date" date-range-picker  style="width:200px;" readonly> <i class="fa fa-calendar u-icon-cal" style="position: absolute;top: 2px;right: 4px;"></i>
					</span>
				</div>
			</div>
		</div>
	</div>
	<div class="col-md-6">
		<div class="panel panel-default">
			<div class="panel-heading bg-white">pick-datetime</div>
			<div class="panel-body">
				<div class="form-group">
					<div class="col-md-4">
						<pick-datetime class="form-control" ng-model="publishTime"></pick-datetime>

					</div>

				</div>
			</div>
		</div>
	</div>
</div>
<div class="row">
	<div class="col-md-6">
		<div class="panel panel-default">
			<div class="panel-heading bg-white">pick-date</div>
			<div class="panel-body">
				<div class="form-group">
					<div class="col-md-4">
						<pick-date class="form-control" model="publishTime2"></pick-date>
					</div>
				</div>
			</div>
		</div>
	</div>	

</div>
