<!--基本表单-->
<div class="row">
  <div class="col-md-6">
    <div class="panel panel-default">
      <div class="panel-heading bg-white">基本表单</div>
      <div class="panel-body">
        <form role="form">
          <div class="form-group">
            <label for="exampleInputEmail1">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" placeholder="Enter email"></div>
          <div class="form-group">
            <label for="exampleInputPassword1">Password</label>
            <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password"></div>
          <div class="form-group">
            <label for="exampleInputFile">File input</label>
            <input type="file" id="exampleInputFile">
            <p class="help-block">Example block-level help text here.</p>
          </div>
          <div class="checkbox">
            <label>
              <input type="checkbox">Check me out</label>
          </div>
          <button type="submit" class="btn btn-default m-b">Submit</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="panel panel-default">
      <div class="panel-heading bg-white">水平表单</div>
      <div class="panel-body">
        <form class="form-horizontal" role="form">
          <div class="form-group">
            <label for="inputEmail3" class="col-sm-2 control-label">Email</label>
            <div class="col-sm-10">
              <input type="email" class="form-control" id="inputEmail3" placeholder="Email"></div>
          </div>
          <div class="form-group">
            <label for="inputPassword3" class="col-sm-2 control-label">Password</label>
            <div class="col-sm-10">
              <input type="password" class="form-control" id="inputPassword3" placeholder="Password"></div>
          </div>
          <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
              <div class="checkbox">
                <label>
                  <input type="checkbox">Remember me</label>
              </div>
            </div>
          </div>
          <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
              <button type="submit" class="btn btn-default">Sign in</button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div class="panel panel-default">
      <div class="panel-heading bg-white">列大小</div>
      <div class="panel-body">
        <div class="row row-sm">
          <div class="col-xs-3">
            <input type="text" class="form-control" placeholder=".col-xs-3"></div>
          <div class="col-xs-4">
            <input type="text" class="form-control" placeholder=".col-xs-4"></div>
          <div class="col-xs-5">
            <input type="text" class="form-control" placeholder=".col-xs-5"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-lg-12">
    <div class="panel panel-default">
      <div class="panel-heading bg-white">内联表单</div>
      <div class="panel-body">
        <form class="form-inline" role="form">
          <div class="form-group">
            <label class="sr-only" for="exampleInputEmail2">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail2" placeholder="Enter email"></div>
          <div class="form-group">
            <div class="input-group">
              <div class="input-group-addon">@</div>
              <input class="form-control" type="email" placeholder="Enter email"></div>
          </div>
          <div class="form-group">
            <label class="sr-only" for="exampleInputPassword2">Password</label>
            <input type="password" class="form-control" id="exampleInputPassword2" placeholder="Password"></div>
          <div class="checkbox m-l">
            <label class="ui-checks">
              <input type="checkbox"> <i></i>
              Remember me
            </label>
          </div>
          <button type="submit" class="btn btn-default">Sign in</button>
        </form>
      </div>
    </div>
  </div>
</div>


<!--验证表单1-->
<div class="row">
  <div class="col-md-12">
    <div class="panel panel-default">
      <div class="panel-heading bg-white">表单验证</div>
      <div class="panel-body">
        <form class="form-horizontal form-validation" role="form" name="form" novalidate>
          <div class="form-group">
            <label  class="col-sm-1 control-label">Email</label>
            <div class="col-sm-11">
              <input type="email" class="form-control" placeholder="Email" ng-model="email" name="email" required>
              <div ng-show="form.email.$dirty && form.email.$invalid">
                <span class="red" ng-show="form.email.$error.required">请填写email</span>
                <span class="red" ng-show="!form.email.$error.required && form.email.$error">email格式不对</span>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-1 control-label">Password</label>
            <div class="col-sm-11">
              <input type="password" class="form-control" placeholder="Password" ng-model="password" name="password" ng-maxlength="6" required>
              <div ng-show="form.password.$dirty && form.password.$invalid">
                <span class="red" ng-show="form.password.$error.required">请填写密码</span>
                <span class="red" ng-show="!form.password.$error.required && form.password.$error">密码格式不对</span>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-1 control-label">tel</label>
            <div class="col-sm-11">
              <input type="text" class="form-control" placeholder="Password" ng-model="tel" name="tel" ng-maxlength="11" ng-pattern="/^[1-9]\d*$/">
              <div ng-show="form.tel.$dirty && form.tel.$invalid">
                <span class="red" ng-show="form.tel.$error">电话格式不对</span>
              </div>
            </div>
          </div>
          <div class="form-group">
            <div class="col-sm-offset-1 col-sm-11">
              <div class="checkbox">
                <label>
                  <input type="checkbox">Remember me</label>
              </div>
            </div>
          </div>
          <div class="form-group">
            <div class="col-sm-offset-1 col-sm-11">
              <button type="submit" class="btn btn-default" ng-disabled="form.$invalid">Sign in</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
