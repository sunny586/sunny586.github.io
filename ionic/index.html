<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <title>webapp</title>
    <link href="lib/ionic/css/ionic.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/angular/angular-chart.js/dist/angular-chart.css">  
    <!-- IF using Sass (run gulp sass first), then uncomment below and remove the CSS includes above
    <link href="css/ionic.app.css" rel="stylesheet">
    -->
  </head>
  <body ng-app="app">
    <!--
      The views will be rendered in the <ion-nav-view> directive below
      Templates are in the /templates folder (but you could also
      have templates inline in this html file if you'd like).
    -->
    <ion-nav-view></ion-nav-view>
    <!-- ionic/angularjs js -->
    <script src="lib/ionic/js/ionic.bundle.js"></script>
    <script src="lib/ngCordova/ng-cordova.js"></script>
    <!-- cordova script (this will be a 404 during development) -->
    <script src="cordova.js"></script>
    <!-- Angular Chart -->
    <script src="lib/angular/Chart.js/Chart.min.js"></script>
    <script src="lib/angular/angular-chart.js/dist/angular-chart.js"></script>
    <!-- your app's js -->
    <script src="js/app.js"></script>
    <script src="js/controllers.js"></script>
    <script src="js/services.js"></script>
    <!--controllers-->
    <script src="js/controllers/dashboard/dashCtrl.js"></script>
    <script src="js/controllers/chats/chatsCtrl.js"></script>
    <script src="js/controllers/chats/ChatsFormCtrl.js"></script>
    <script src="js/controllers/chats/ChartsCtrl.js"></script>
    <script src="js/controllers/dashboard/CameraCtrl.js"></script>
    <!--services-->
    <script src="js/services/cacheService.js"></script>
  </body>
</html>
