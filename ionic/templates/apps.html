<!--
Create tabs with an icon and label, using the tabs-positive style.
Each tab's child <ion-nav-view>
directive will have its own
navigation history that also transitions its views in and out.
-->
<ion-nav-bar class="bar-stable">
  <ion-nav-back-button></ion-nav-back-button>
</ion-nav-bar>

<ion-tabs class="tabs-icon-top tabs-color-active-positive">

  <!-- Dashboard Tab -->
  <ion-tab title="Status" icon-off="ion-ios-pulse" icon-on="ion-ios-pulse-strong" href="#/app/dash">
    <ion-nav-view name="app-dash"></ion-nav-view>
  </ion-tab>

  <!-- Chats Tab -->
  <ion-tab title="Chats" icon-off="ion-ios-chatboxes-outline" icon-on="ion-ios-chatboxes" href="#/app/chats">
    <ion-nav-view name="app-chats"></ion-nav-view>
  </ion-tab>

  <!-- Account Tab -->
  <ion-tab title="Account" icon-off="ion-ios-star-outline" icon-on="ion-ios-star" href="#/app/account">
    <ion-nav-view name="app-account"></ion-nav-view>
  </ion-tab>

</ion-tabs>
