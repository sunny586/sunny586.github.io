<ion-view view-title="Camera">
	<ion-content class="padding">
		<div class="bar bar-header">
			<div class="h1 title">拍照、相册并上传至Upyun Demo</div>
		</div>
		<div class="content has-header">				
			<div class="list">
				<div class="item item-avatar item-icon-right">
					<img ng-src="{{image}}!60" name="AssistImageName" /> <i class="icon ion-images royal" data-tap-disabled="true" ng-click="showImageUploadChoices()"></i>
				</div>
			</div>
			<div class="list card">
				<div class="item item-body">
					<img ng-src="{{image}}" name="AssistImageName" />
					<p>测试图片</p>
				</div>
			</div>

		</div>
	</ion-content>
</ion-view>
