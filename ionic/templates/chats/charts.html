<ion-view view-title="charts">
	<ion-content class="padding">
		<!-- <div class="bar bar-header">
			<div class="h1 title">Angular charts</div>
		</div> -->
		<div class="content">
			<div class="card">
				<div class="item item-divider">折线图</div>
				<div class="item item-text-wrap">
					<canvas class="chart chart-line" chart-data="data1" chart-labels="labels1" chart-legend="true" chart-series="series1" chart-click="onClick"></canvas>
				</div>
				<!-- <div class="item item-divider">卡片底部！</div>
			-->
		</div>
		<div class="card">
			<div class="item item-divider">柱状图</div>
			<div class="item item-text-wrap">
				<canvas id="bar" class="chart chart-bar" chart-data="data2" chart-labels="labels2" chart-series="series2"></canvas>
			</div>
		</div>
		<div class="card">
			<div class="item item-divider">饼图</div>
			<div class="item item-text-wrap">
				<canvas id="pie" class="chart chart-pie" chart-data="data3" chart-labels="labels3"></canvas>
			</div>
		</div>
		<div class="card">
			<div class="item item-divider">雷达图</div>
			<div class="item item-text-wrap">
				<canvas id="radar" class="chart chart-radar" chart-data="data4" chart-labels="labels4"></canvas>
			</div>
		</div>
	</div>
</ion-content>
</ion-view>
